name: Kafka test run

on:
  workflow_dispatch:
    inputs:
      TEST_TITLE:
        description: Test Run Title. Will added in Allure Report Title
        type: string
        required: false
        default: ""

jobs:
  test-run:
    runs-on: ubuntu-latest
    env:
      # ---------- IMPORTANT VARS
      WORKFLOW_REPORT_ID: kafka_test
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GH_TOKEN_NAME: ${{ vars.GH_TOKEN_NAME }}
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ vars.GH_REPO }}

      PROFILE: docker
      COMPOSE_PROFILES: test
      PREFIX: arrnel
      ARCH: amd64

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GITHUB_SHA }}

      - name: Set TEST_TITLE
        uses: ./.github/actions/test-run-title
        with:
          test_title: ${{ inputs.TEST_TITLE }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backends
        run: |
          ./gradlew jibDockerBuild -x :rococo-tests:test

      - name: Run Kafka tests
        uses: ./.github/actions/run-tests
        if: always()
        continue-on-error: true

      - name: Generate and Deploy Allure Report in GitHub Pages
        uses: ./.github/actions/generate-and-deploy-allure-report
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          subfolder: ${{ env.WORKFLOW_REPORT_ID }}
          report_name: ${{ env.TEST_TITLE }}
          allure_results_path: allure-results
          allure_history_path: allure-history
          report_branch: gh-pages
